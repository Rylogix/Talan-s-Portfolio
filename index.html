<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Talan Gray portfolio landing page with social links and voice acting site access."
    />
    <meta name="theme-color" content="#E8D5BD" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Talan Gray | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Bangers&family=Barlow+Condensed:wght@600;700&family=Bebas+Neue&family=Black+Ops+One&family=Bungee+Shade&family=Manrope:wght@500;600;700;800&family=Monoton&family=Oswald:wght@500;700&family=Righteous&family=Rubik+Glitch&family=Teko:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #e8d5bd;
        --bg-soft: #f5f5f5;
        --surface: #ffffff;
        --surface-strong: #f7f7f7;
        --surface-border: #8c8175;
        --text: #2b2622;
        --text-muted: #8c8175;
        --accent: #b23a3a;
        --accent-strong: #b23a3a;
        --shadow: 0 14px 28px rgba(0, 0, 0, 0.35);
        --card-solid-1: #ffffff;
        --card-solid-2: #f0f0f0;
        --card-border: #b23a3a;
        --card-shadow: 0 10px 22px rgba(0, 0, 0, 0.34);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        color: var(--text);
        font-family: "Manrope", "Segoe UI", sans-serif;
        background: var(--bg);
        line-height: 1.5;
      }

      body::before {
        content: none;
      }

      body::after {
        content: none;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .shell {
        width: min(1080px, calc(100% - 2rem));
        margin-inline: auto;
      }

      .site-header {
        position: sticky;
        top: 0.7rem;
        z-index: 30;
        width: min(1140px, calc(100% - 1rem));
        margin-inline: auto;
        margin-top: 0.7rem;
        border-radius: 999px;
        border: 1px solid var(--surface-border);
        background: var(--surface-strong);
        box-shadow: var(--shadow);
      }

      .site-header__inner {
        min-height: 4rem;
        padding: 0.5rem 1rem;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 0.75rem;
      }

      .site-nav {
        grid-column: 2 / 3;
        justify-self: center;
        display: inline-flex;
        gap: 0.35rem;
        padding: 0.2rem;
        border-radius: 999px;
        background: #ffffff;
        border: 1px solid #8c8175;
      }

      .site-nav a {
        padding: 0.55rem 0.9rem;
        border-radius: 999px;
        color: var(--text-muted);
        font-weight: 600;
        font-size: 0.92rem;
        transition: color 160ms ease, background-color 160ms ease;
      }

      .site-nav a:hover {
        color: var(--text);
        background: #f0f0f0;
      }

      .site-nav a:focus-visible,
      .social-link:focus-visible {
        outline: 2px solid var(--accent-strong);
        outline-offset: 3px;
      }

      main {
        padding-bottom: 3rem;
      }

      .site-footer {
        padding: 0.6rem 0 2.2rem;
        text-align: center;
        color: var(--text-muted);
        font-size: 0.88rem;
      }

      .site-footer p {
        margin: 0;
      }

      .hero {
        padding-top: clamp(3rem, 8vw, 5.5rem);
        padding-bottom: 1.8rem;
        text-align: center;
      }

      .hero__name-wrap {
        min-height: 1.2em;
        width: 100%;
        overflow: visible;
      }

      .hero__name {
        margin: 0;
        display: inline-block;
        max-inline-size: 100%;
        text-transform: uppercase;
        font-family: "Anton", "Arial Narrow", sans-serif;
        font-size: clamp(3.1rem, 12.5vw, 8.6rem);
        line-height: 0.9;
        letter-spacing: 0.065em;
        white-space: nowrap;
        transform-origin: center center;
        will-change: transform;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.7), 0 0 10px rgba(178, 58, 58, 0.26);
        transition: letter-spacing 120ms linear, text-shadow 120ms linear, opacity 120ms linear;
      }

      .hero__name.is-glitching {
        letter-spacing: 0.08em;
        text-shadow:
          0 0 16px rgba(178, 58, 58, 0.52),
          -2px 0 rgba(255, 255, 255, 0.55),
          2px 0 rgba(178, 58, 58, 0.45);
      }

      .hero__subtitle {
        margin: 0.9rem 0 0;
        color: var(--text-muted);
        font-family: "Barlow Condensed", sans-serif;
        font-size: clamp(0.95rem, 2vw, 1.2rem);
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .social-links {
        width: min(780px, 100%);
        margin-inline: auto;
        margin-top: 1.5rem;
      }

      .social-links__list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 0.9rem;
        grid-template-columns: repeat(3, minmax(5.35rem, 6.5rem));
        justify-content: center;
      }

      .social-link {
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        width: 100%;
        min-height: 3.5rem;
        padding: 0.84rem;
        border-radius: 1rem;
        border: 1px solid var(--card-border);
        background: var(--card-solid-1);
        color: var(--text);
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background-color 180ms ease,
          box-shadow 220ms ease;
        box-shadow: var(--card-shadow);
      }

      .social-link::before {
        content: none;
      }

      .social-link:hover {
        transform: translateY(-3px);
        border-color: var(--accent-strong);
        background: var(--card-solid-2);
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.16);
      }

      .social-link__icon {
        flex: 0 0 auto;
        width: 1.72rem;
        height: 1.72rem;
        color: var(--accent-strong);
      }

      @media (max-width: 760px) {
        .site-header {
          margin-top: 0.4rem;
          border-radius: 1rem;
        }

        .site-header__inner {
          min-height: auto;
          padding: 0.7rem;
          grid-template-columns: 1fr auto;
          align-items: start;
          gap: 0.7rem;
        }

        .site-nav {
          grid-column: 1 / -1;
          order: 3;
          justify-self: stretch;
          justify-content: space-between;
        }

        .site-nav a {
          flex: 1;
          text-align: center;
        }

        .hero__name {
          white-space: normal;
        }

        .social-links__list {
          grid-template-columns: repeat(3, minmax(4.5rem, 5.5rem));
          justify-content: center;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .hero__name,
        .site-nav a,
        .social-link {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <nav class="site-nav" aria-label="Primary">
          <a href="/va/">Voice Acting</a>
        </nav>
      </div>
    </header>

    <main class="shell">
      <section class="hero" aria-labelledby="home-title">
        <div class="hero__name-wrap">
          <h1 id="home-title" class="hero__name" data-glitch-title>TALAN GRAY</h1>
        </div>
        <p class="hero__subtitle">Voice Actor | Creator</p>
      </section>

      <section class="social-links" aria-labelledby="connect-title">
        <h2 class="sr-only" id="connect-title">Social Links</h2>
        <ul class="social-links__list">
          <li>
            <a
              class="social-link"
              href="https://discord.gg/KKA3ttRNbu"
              target="_blank"
              rel="noreferrer"
              aria-label="Discord Server"
              title="Discord Server"
            >
              <svg class="social-link__icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M19.8 4.2a16 16 0 0 0-4-1.2l-.2.4a14 14 0 0 1 3.8 1.2A13 13 0 0 0 4.6 4.4a14 14 0 0 1 3.8-1.2l-.2-.4a16 16 0 0 0-4 1.2C1.7 7.8.9 11.2 1.2 14.6a16 16 0 0 0 4.9 2.5l1-1.6c-.6-.2-1.1-.5-1.6-.8.1-.1.2-.2.3-.2 3 1.4 6.2 1.4 9.2 0l.3.2c-.5.3-1 .6-1.6.8l1 1.6a16 16 0 0 0 4.9-2.5c.4-3.9-.6-7.3-3.8-10.4ZM8.8 13.5c-.9 0-1.6-.8-1.6-1.8s.7-1.8 1.6-1.8 1.6.8 1.6 1.8-.7 1.8-1.6 1.8Zm6.4 0c-.9 0-1.6-.8-1.6-1.8s.7-1.8 1.6-1.8 1.6.8 1.6 1.8-.7 1.8-1.6 1.8Z"
                />
              </svg>
            </a>
          </li>
          <li>
            <a
              class="social-link"
              href="https://www.youtube.com/@Pahnduhhh"
              target="_blank"
              rel="noreferrer"
              aria-label="YouTube"
              title="YouTube"
            >
              <svg class="social-link__icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M21.6 7.8a2.8 2.8 0 0 0-2-2C17.8 5.3 12 5.3 12 5.3s-5.8 0-7.6.5a2.8 2.8 0 0 0-2 2A29 29 0 0 0 2 12a29 29 0 0 0 .4 4.2 2.8 2.8 0 0 0 2 2c1.8.5 7.6.5 7.6.5s5.8 0 7.6-.5a2.8 2.8 0 0 0 2-2A29 29 0 0 0 22 12a29 29 0 0 0-.4-4.2ZM9.9 15.3V8.7L15.8 12l-5.9 3.3Z"
                />
              </svg>
            </a>
          </li>
          <li>
            <a
              class="social-link"
              href="https://www.tiktok.com/@pahndaa_"
              target="_blank"
              rel="noreferrer"
              aria-label="TikTok"
              title="TikTok"
            >
              <svg class="social-link__icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M14.3 3h2.5a4.8 4.8 0 0 0 3.2 3.2v2.6a7.1 7.1 0 0 1-3.2-.8v6.3a5.3 5.3 0 1 1-5.3-5.3 5 5 0 0 1 .8.1v2.7a2.6 2.6 0 1 0 1.9 2.5V3Z"
                />
              </svg>
            </a>
          </li>
        </ul>
      </section>
    </main>

    <footer class="site-footer shell">
      <p>ï¿½ Rylogix. All rights reserved.</p>
    </footer>

    <script>
      (() => {
        const title = document.querySelector("[data-glitch-title]");
        if (!title) return;
        const titleWrap = title.parentElement;

        const fontCycle = [
          '"Anton", "Arial Narrow", sans-serif',
          '"Bebas Neue", "Arial Narrow", sans-serif',
          '"Archivo Black", "Arial Black", sans-serif',
          '"Bangers", "Arial Black", sans-serif',
          '"Black Ops One", "Arial Black", sans-serif',
          '"Rubik Glitch", "Arial Black", sans-serif',
          '"Oswald", "Arial Narrow", sans-serif',
          '"Righteous", "Arial Black", sans-serif',
          '"Bungee Shade", "Arial Black", sans-serif',
          '"Monoton", "Arial Black", sans-serif',
          '"Teko", "Arial Narrow", sans-serif',
          '"Barlow Condensed", "Arial Narrow", sans-serif'
        ];

        const fitTitleToViewport = () => {
          if (!(titleWrap instanceof HTMLElement)) return;
          title.style.transform = "scale(1)";

          const availableWidth = titleWrap.clientWidth * 0.94;
          const textWidth = title.scrollWidth;

          if (availableWidth <= 0 || textWidth <= 0) return;

          const scale = Math.min(1, availableWidth / textWidth);
          title.style.transform = `scale(${scale.toFixed(3)})`;
        };

        const setTitleFont = (fontFamily) => {
          title.style.fontFamily = fontFamily;
          fitTitleToViewport();
        };

        let settledIndex = 0;
        setTitleFont(fontCycle[settledIndex]);

        window.addEventListener("resize", fitTitleToViewport, { passive: true });
        if (document.fonts?.ready) {
          document.fonts.ready.then(fitTitleToViewport);
        }

        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          return;
        }

        const glitchWindowMs = 520;
        const glitchStepMs = 45;
        const cycleEveryMs = 2400;

        const runGlitch = () => {
          const targetIndex = (settledIndex + 1) % fontCycle.length;
          const finishAt = Date.now() + glitchWindowMs;

          title.classList.add("is-glitching");

          const glitchTicker = window.setInterval(() => {
            const randomIndex = Math.floor(Math.random() * fontCycle.length);
            setTitleFont(fontCycle[randomIndex]);

            if (Date.now() >= finishAt) {
              window.clearInterval(glitchTicker);
              settledIndex = targetIndex;
              setTitleFont(fontCycle[settledIndex]);
              title.classList.remove("is-glitching");
            }
          }, glitchStepMs);
        };

        const loop = () => {
          runGlitch();
          window.setTimeout(loop, cycleEveryMs);
        };

        window.setTimeout(loop, cycleEveryMs);
      })();
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Talan Gray portfolio landing page with social links and voice acting site access."
    />
    <meta name="theme-color" content="#040807" />
    <title>Talan Gray | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Barlow+Condensed:wght@600;700&family=Bebas+Neue&family=Manrope:wght@500;600;700;800&family=Oswald:wght@500;700&family=Teko:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #040807;
        --bg-soft: #0a130f;
        --surface: rgba(12, 20, 16, 0.72);
        --surface-strong: rgba(11, 18, 14, 0.9);
        --surface-border: rgba(112, 255, 183, 0.28);
        --text: #effff6;
        --text-muted: #bdd6c6;
        --accent: #66ffac;
        --accent-strong: #9fffd0;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        color: var(--text);
        font-family: "Manrope", "Segoe UI", sans-serif;
        background:
          radial-gradient(55rem 30rem at 12% -5%, rgba(98, 255, 174, 0.26), transparent),
          radial-gradient(45rem 28rem at 90% 8%, rgba(255, 255, 255, 0.15), transparent),
          radial-gradient(55rem 30rem at 50% 110%, rgba(54, 147, 95, 0.24), transparent),
          linear-gradient(180deg, #030706, #07110d 35%, #040807);
        line-height: 1.5;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.06;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 26px 26px;
        mask-image: radial-gradient(circle at center, black 22%, transparent 80%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .shell {
        width: min(1080px, calc(100% - 2rem));
        margin-inline: auto;
      }

      .site-header {
        position: sticky;
        top: 0.7rem;
        z-index: 30;
        width: min(1140px, calc(100% - 1rem));
        margin-inline: auto;
        margin-top: 0.7rem;
        border-radius: 999px;
        border: 1px solid var(--surface-border);
        background: color-mix(in oklab, var(--surface-strong) 86%, transparent);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
      }

      .site-header__inner {
        min-height: 4rem;
        padding: 0.5rem 1rem;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 0.75rem;
      }

      .brand {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .site-nav {
        grid-column: 2;
      }

      .site-nav a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.45rem;
        padding: 0.4rem 1.1rem;
        border-radius: 999px;
        border: 1px solid rgba(102, 255, 172, 0.45);
        background: rgba(102, 255, 172, 0.12);
        color: var(--text);
        font-size: 0.86rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: background-color 160ms ease, border-color 160ms ease, transform 160ms ease;
      }

      .site-nav a:hover {
        background: rgba(102, 255, 172, 0.2);
        border-color: rgba(150, 255, 206, 0.85);
        transform: translateY(-1px);
      }

      .site-nav a:focus-visible,
      .tree-link:focus-visible {
        outline: 2px solid var(--accent-strong);
        outline-offset: 3px;
      }

      .top-note {
        justify-self: end;
        color: rgba(189, 214, 198, 0.82);
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      main {
        padding-bottom: 3rem;
      }

      .hero {
        padding-top: clamp(3rem, 8vw, 5.5rem);
        padding-bottom: 1.8rem;
        text-align: center;
      }

      .hero__name-wrap {
        min-height: 1.12em;
      }

      .hero__name {
        margin: 0;
        text-transform: uppercase;
        font-family: "Anton", "Arial Narrow", sans-serif;
        font-size: clamp(4.2rem, 16vw, 11rem);
        line-height: 0.9;
        letter-spacing: 0.08em;
        white-space: nowrap;
        text-shadow: 0 0 28px rgba(102, 255, 172, 0.4);
        transition: letter-spacing 120ms linear, text-shadow 120ms linear, opacity 120ms linear;
      }

      .hero__name.is-glitching {
        letter-spacing: 0.1em;
        text-shadow:
          0 0 34px rgba(102, 255, 172, 0.58),
          -2px 0 rgba(255, 255, 255, 0.4),
          2px 0 rgba(39, 255, 132, 0.45);
      }

      .hero__subtitle {
        margin: 0.9rem 0 0;
        color: var(--text-muted);
        font-family: "Barlow Condensed", sans-serif;
        font-size: clamp(0.95rem, 2vw, 1.2rem);
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      .tree {
        width: min(680px, 100%);
        margin-inline: auto;
        margin-top: 1.5rem;
        border-radius: 1.2rem;
        border: 1px solid rgba(102, 255, 172, 0.24);
        background: color-mix(in oklab, var(--surface) 90%, transparent);
        backdrop-filter: blur(14px);
        box-shadow: var(--shadow);
        padding: clamp(1rem, 2.3vw, 1.55rem);
      }

      .tree__title {
        margin: 0 0 0.75rem;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent-strong);
      }

      .tree-links {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 0.75rem;
      }

      .tree-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        width: 100%;
        min-height: 3.25rem;
        padding: 0.8rem 0.95rem;
        border-radius: 0.9rem;
        border: 1px solid rgba(102, 255, 172, 0.28);
        background:
          linear-gradient(120deg, rgba(102, 255, 172, 0.14), rgba(255, 255, 255, 0.08));
        color: var(--text);
        transition: transform 160ms ease, border-color 160ms ease, background-color 160ms ease;
      }

      .tree-link:hover {
        transform: translateY(-2px);
        border-color: rgba(163, 255, 212, 0.8);
        background:
          linear-gradient(120deg, rgba(102, 255, 172, 0.22), rgba(255, 255, 255, 0.12));
      }

      .tree-link__name {
        font-size: 1rem;
        font-weight: 800;
      }

      .tree-link__url {
        color: var(--text-muted);
        font-size: 0.85rem;
        font-weight: 700;
      }

      @media (max-width: 760px) {
        .site-header__inner {
          grid-template-columns: 1fr auto;
        }

        .top-note {
          display: none;
        }

        .hero__name {
          white-space: normal;
        }

        .tree-link {
          flex-direction: column;
          align-items: flex-start;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .hero__name,
        .site-nav a,
        .tree-link {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <p class="brand" aria-label="Site title">Talan Gray</p>
        <nav class="site-nav" aria-label="Primary">
          <a href="/va/">Voice Acting</a>
        </nav>
        <p class="top-note" aria-hidden="true">Portfolio</p>
      </div>
    </header>

    <main class="shell">
      <section class="hero" aria-labelledby="home-title">
        <div class="hero__name-wrap">
          <h1 id="home-title" class="hero__name" data-glitch-title>TALAN GRAY</h1>
        </div>
        <p class="hero__subtitle">Voice Actor | Creator</p>
      </section>

      <section class="tree" aria-labelledby="connect-title">
        <h2 class="tree__title" id="connect-title">Find Me</h2>
        <ul class="tree-links">
          <li>
            <a
              class="tree-link"
              href="https://discord.gg/KKA3ttRNbu"
              target="_blank"
              rel="noreferrer"
            >
              <span class="tree-link__name">Discord Server</span>
              <span class="tree-link__url">discord.gg/KKA3ttRNbu</span>
            </a>
          </li>
          <li>
            <a
              class="tree-link"
              href="https://www.youtube.com/@Pahnduhhh"
              target="_blank"
              rel="noreferrer"
            >
              <span class="tree-link__name">YouTube</span>
              <span class="tree-link__url">youtube.com/@Pahnduhhh</span>
            </a>
          </li>
          <li>
            <a
              class="tree-link"
              href="https://www.tiktok.com/@pahndaa_"
              target="_blank"
              rel="noreferrer"
            >
              <span class="tree-link__name">TikTok</span>
              <span class="tree-link__url">tiktok.com/@pahndaa_</span>
            </a>
          </li>
        </ul>
      </section>
    </main>

    <script>
      (() => {
        const title = document.querySelector("[data-glitch-title]");
        if (!title) return;

        const fontCycle = [
          '"Anton", "Arial Narrow", sans-serif',
          '"Bebas Neue", "Arial Narrow", sans-serif',
          '"Archivo Black", "Arial Black", sans-serif',
          '"Oswald", "Arial Narrow", sans-serif',
          '"Teko", "Arial Narrow", sans-serif',
          '"Barlow Condensed", "Arial Narrow", sans-serif'
        ];

        let settledIndex = 0;
        title.style.fontFamily = fontCycle[settledIndex];

        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          return;
        }

        const glitchWindowMs = 520;
        const glitchStepMs = 45;
        const cycleEveryMs = 2400;

        const runGlitch = () => {
          const targetIndex = (settledIndex + 1) % fontCycle.length;
          const finishAt = Date.now() + glitchWindowMs;

          title.classList.add("is-glitching");

          const glitchTicker = window.setInterval(() => {
            const randomIndex = Math.floor(Math.random() * fontCycle.length);
            title.style.fontFamily = fontCycle[randomIndex];

            if (Date.now() >= finishAt) {
              window.clearInterval(glitchTicker);
              settledIndex = targetIndex;
              title.style.fontFamily = fontCycle[settledIndex];
              title.classList.remove("is-glitching");
            }
          }, glitchStepMs);
        };

        const loop = () => {
          runGlitch();
          window.setTimeout(loop, cycleEveryMs);
        };

        window.setTimeout(loop, cycleEveryMs);
      })();
    </script>
  </body>
</html>
